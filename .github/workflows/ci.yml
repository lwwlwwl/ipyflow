name: ipyflow

on: [push, pull_request, workflow_dispatch]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ 'ubuntu-22.04', 'windows-latest' ]
        python-version: [ '3.7', '3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14' ]
        include:
          - python-version: '3.7'
            os: 'macos-15-intel'
          - python-version: '3.8'
            os: 'macos-15-intel'
          - python-version: '3.9'
            os: 'macos-15-intel'
          - python-version: '3.10'
            os: 'macos-latest'
          - python-version: '3.11'
            os: 'macos-latest'
          - python-version: '3.12'
            os: 'macos-latest'
          - python-version: '3.13'
            os: 'macos-latest'
          - python-version: '3.14'
            os: 'macos-latest'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./core/.[dev]
    - name: Lint with ruff
      run: make lint
    - name: Run type checker with mypy
      # only run on ubuntu-latest; should be same for any OS, and
      # mypy seems to have issues on windows 3.6.x specifically
      # wherein it gives a false positive syntax error
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: make typecheck
    - name: Compute coverage and run tests with pytest (excluding typing)
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'}}
      run: make xmlcov
    - name: Run tests with pytest, excluding typing and coverage
      if: ${{ ! (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11') }}
      run: make check_no_typing
    - name: Upload coverage report
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'}}
      uses: codecov/codecov-action@v1
      with:
        token: '${{ secrets.CODECOV_TOKEN }}'
        files: ./coverage.xml
        env_vars: PYTHON
        name: codecov-umbrella
        fail_ci_if_error: true
        verbose: true

  ui-tests:
    # End-to-end tests: builds the labextension, installs the ipyflow kernel,
    # then runs the headless kernel comm test and the Galata (Playwright) UI
    # tests against a real JupyterLab. Separate from the Python matrix above.
    #
    # Opt-in / on-demand only (these are slow and browser-based): runs when the
    # workflow is manually dispatched, or on a pull request labeled
    # 'run-ui-tests'. Skipped on ordinary pushes/PRs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-ui-tests')
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        # The labextension toolchain (npm-run-all2 9, typescript 6, eslint 10,
        # vitest 4) requires node >= 22; node 20's npm hits the
        # "Exit handler never called!" crash and silently skips the build.
        node-version: '24'
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./core/.[dev] jupyterlab
    - name: Build labextension, link it, and install the kernel
      run: |
        # Install deps and build as two separate top-level commands rather than
        # letting the package's `prepare` script build during `npm install`.
        # Building inside the install spawns nested `npm run` processes, which
        # trips npm's "Exit handler never called!" crash on the CI runner and
        # leaves the labextension unbuilt. `--ignore-scripts` keeps install from
        # running prepare; the build is then a visible step with its own exit code.
        (cd frontend/labextension && npm ci --ignore-scripts && npm run build)
        # Verify the build output exists before continuing instead of failing
        # much later (and opaquely) at the sanity grep below.
        test -f core/ipyflow/resources/labextension/package.json
        ls core/ipyflow/resources/labextension/static/remoteEntry.*.js
        cp frontend/labextension/install.json core/ipyflow/resources/labextension
        make extlink
        make kernel
    - name: Sanity check extension + kernel are discoverable
      run: |
        jupyter labextension list 2>&1 | grep -i jupyterlab-ipyflow
        jupyter kernelspec list 2>&1 | grep -i ipyflow
    - name: Headless kernel comm-protocol e2e
      run: make e2e
    - name: Install UI test dependencies and browser
      run: |
        cd frontend/labextension/ui-tests
        npm install
        npx playwright install --with-deps chromium
    - name: Galata UI e2e
      run: |
        cd frontend/labextension/ui-tests
        npm test
    - name: Upload Playwright report
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/labextension/ui-tests/playwright-report/
        retention-days: 7
